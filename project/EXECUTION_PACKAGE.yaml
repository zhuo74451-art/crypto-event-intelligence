runtime_blockers:
- id: RUNTIME-001
  fact: HumanThink main at e68705594eaf824922e92c731c41a661b880d673 does not contain the Autodev runtime.
  required: Publish a reviewed runtime release.
- id: RUNTIME-002
  fact: 'Draft PR #3 installs ht-autodev and exposes no humanthink-autodev activate command.'
  required: Implement and validate the exact stable activation interface.
- id: RUNTIME-003
  fact: The alpha CLI runs one package file and cannot load a planning ref plus project/EXECUTION_PACKAGE.yaml.
  required: Add package loading, schema validation, planning-ref resolution, and project lock.
- id: RUNTIME-004
  fact: The alpha graph does not dispatch this declarative task graph, GPT gates, Owner gate, or terminal contracts.
  required: Implement the declarative dispatcher and gates.
- id: RUNTIME-005
  fact: No verified adapter sends only the active node and hot context to Reasonix CLI.
  required: Implement current-node-only dispatch.
- id: RUNTIME-006
  fact: No end-to-end test proves activation receipt, automatic transitions, finite retry, recovery, no-change closure, gate routing, notification,
    and stop behavior.
  required: Pass an end-to-end compatibility suite.
- id: RUNTIME-007
  fact: Local project path and preconfigured credentials are not verifiable from GitHub.
  required: Pass activation preflight without exposing secrets.
