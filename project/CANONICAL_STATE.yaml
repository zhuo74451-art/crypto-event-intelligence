accepted_state:
  - The first product responsibility is market judgment, not copy trading or order advice.
  - The first user outcomes are autonomous research prioritization and autonomous watchlist creation.
  - The system operates without routine human judgment in the daily loop.
  - AI or bounded agents decide evidence sufficiency, event identity, importance, thesis creation, affected assets, time horizon, priced-in state, priority, next evidence, and lifecycle transitions.
  - Ordinary uncertainty is handled through abstention, evidence gathering, scheduled review, downgrade, invalidation, or archive instead of asking the owner.
  - Limited autonomous discovery of new themes and assets is allowed inside the crypto-market, public-data, cost, and risk boundaries.
  - The owner retains governance, budget, credential, production, publishing, wallet, trading, and stop authority.
  - The central business object is an autonomous thesis portfolio with explicit attention states.
  - Events are entry evidence; themes and theses are persistent interpretation objects.
  - Historical and real-time shadow evidence are required before trusting autonomous judgment quality.

